<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta Padrón - Partido Justicialista Coronel Suárez</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .pj-gradient { background: linear-gradient(135deg, #00529b 0%, #003d73 100%); }
        body { background-color: #f3f4f6; }
        .logo-container { filter: drop-shadow(0 6px 8px rgba(0,0,0,0.3)); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans text-gray-900">

    <header class="pj-gradient text-white py-10 shadow-xl text-center flex flex-col items-center">
        <div class="logo-container mb-6">
            <img src="logo.jpg" alt="Logo PJ" class="w-32 h-32 object-contain rounded-full border-4 border-white/20 bg-white" onerror="this.style.display='none';">
        </div>
        <h1 class="text-3xl md:text-4xl font-black uppercase tracking-tighter leading-tight px-4 text-white">Partido Justicialista</h1>
        <h2 class="text-xl md:text-2xl font-bold uppercase tracking-wider mt-1 opacity-90 text-white">Coronel Suárez</h2>
        <div class="mt-6 bg-blue-400/30 px-8 py-2 rounded-full border border-white/20 text-white font-bold uppercase tracking-[0.2em] text-sm">
            Consulta de Afiliados
        </div>
    </header>

    <main class="flex-grow container mx-auto px-4 py-8 max-w-2xl">
        <div class="bg-white rounded-3xl shadow-2xl p-8 mb-8 border border-gray-100 relative overflow-hidden">
            <div id="loadingOverlay" class="absolute inset-0 bg-white/95 z-20 flex flex-col items-center justify-center transition-opacity duration-500">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-900 mb-4"></div>
                <p id="loadingText" class="text-blue-900 font-bold text-sm animate-pulse">CARGANDO PADRÓN...</p>
            </div>

            <label for="searchInput" class="block text-xs font-black text-blue-900 mb-4 uppercase tracking-[0.15em]">Ingrese Apellido o DNI</label>
            <div class="relative">
                <input type="text" id="searchInput" placeholder="Ej: Abalos o 36764951" class="w-full pl-14 pr-6 py-5 bg-gray-50 border-2 border-gray-100 rounded-2xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 focus:bg-white outline-none transition-all text-xl font-medium shadow-inner" disabled>
                <div class="absolute left-5 top-1/2 -translate-y-1/2 text-blue-900/30">
                    <i class="fas fa-search text-2xl"></i>
                </div>
            </div>
            <p class="text-[10px] text-gray-400 mt-4 text-center">Presione <strong>Enter</strong> para confirmar la búsqueda y guardar registro.</p>
        </div>

        <div id="resultsArea" class="space-y-5">
            <div id="welcomeMessage" class="text-center py-20 bg-white/40 rounded-3xl border-2 border-dashed border-gray-200">
                <i class="fas fa-fingerprint text-3xl text-gray-300 mb-4"></i>
                <p class="text-gray-500 font-bold uppercase tracking-widest text-xs">Esperando búsqueda...</p>
            </div>
        </div>
    </main>

    <script>
        const CSV_FILENAME = 'padron.csv';
        let padronData = [];

        // Función para enviar la búsqueda a Google Forms de forma invisible
        async function registrarConsulta(termino) {
            const FORM_ID = "1-ODiZM8_YbLIG1FIhv37debwbVkSTD1FZ8f7daktd5s";
            const ENTRY_ID = "entry.1491771147";
            const url = `https://docs.google.com/forms/d/e/${FORM_ID}/formResponse?${ENTRY_ID}=${encodeURIComponent(termino)}&submit=Submit`;
            
            fetch(url, { mode: 'no-cors' }).catch(e => console.log("Registro enviado"));
        }

        async function loadCSV() {
            try {
                const response = await fetch(CSV_FILENAME);
                const data = await response.text();
                const rows = data.split(/\r?\n/);
                padronData = rows.slice(7).map(row => row.split(';').map(cell => cell.trim().replace(/^"|"$/g, ''))).filter(row => row.length >= 3);
                document.getElementById('loadingOverlay').style.display = 'none';
                document.getElementById('searchInput').disabled = false;
            } catch (e) {
                document.getElementById('loadingText').innerText = "ERROR AL CARGAR";
            }
        }

        const normalizeText = (text) => text.toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");

        const renderResult = (p) => {
            return `<div class="bg-white rounded-3xl shadow-lg p-6 border border-gray-100 animate-fade-in">
                <h3 class="text-2xl font-black text-gray-800">${p[0]}</h3>
                <p class="text-lg font-medium text-gray-500 mb-4">${p[1]}</p>
                <div class="bg-blue-50 p-4 rounded-2xl flex justify-between mb-4">
                    <span class="text-blue-900/40 font-bold text-xs uppercase">DNI</span>
                    <span class="text-xl font-black text-blue-900">${p[2]}</span>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-gray-50 p-4 rounded-2xl text-center"><p class="text-[10px] text-gray-400 uppercase">Mesa</p><p class="text-2xl font-black">${p[5]}</p></div>
                    <div class="bg-gray-50 p-4 rounded-2xl text-center"><p class="text-[10px] text-gray-400 uppercase">Orden</p><p class="text-2xl font-black">${p[6]}</p></div>
                </div>
                <div class="mt-4 pt-4 border-t border-gray-100"><p class="font-black text-gray-800 text-sm uppercase">${p[4]}</p></div>
            </div>`;
        };

        const input = document.getElementById('searchInput');
        input.addEventListener('input', () => {
            const term = normalizeText(input.value);
            if (term.length < 3) return;
            const filtered = padronData.filter(row => normalizeText(row[0]).includes(term) || row[2].includes(term));
            document.getElementById('resultsArea').innerHTML = filtered.length ? filtered.slice(0, 20).map(p => renderResult(p)).join('') : '<p class="text-center">No encontrado</p>';
        });

        // Registrar cuando el usuario presiona Enter
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && input.value.length >= 3) {
                registrarConsulta(input.value);
            }
        });

        window.addEventListener('DOMContentLoaded', loadCSV);
    </script>
</body>
</html>
