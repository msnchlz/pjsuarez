<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta Padrón - Partido Justicialista Coronel Suárez</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .pj-blue { background-color: #00529b; }
        .pj-gradient { background: linear-gradient(135deg, #00529b 0%, #003d73 100%); }
        body { background-color: #f3f4f6; }
        .logo-container { filter: drop-shadow(0 6px 8px rgba(0,0,0,0.3)); }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans text-gray-900">

    <!-- Header -->
    <header class="pj-gradient text-white py-10 shadow-xl text-center flex flex-col items-center">
        <div class="logo-container mb-6">
            <!-- Imagen actualizada a logo.jpg -->
            <img src="logo.jpg" alt="Logo Partido Justicialista" class="w-32 h-32 object-contain rounded-full border-4 border-white/20 bg-white" onerror="this.style.display='none';">
        </div>
        
        <h1 class="text-3xl md:text-4xl font-black uppercase tracking-tighter leading-tight px-4 text-white">Partido Justicialista</h1>
        <h2 class="text-xl md:text-2xl font-bold uppercase tracking-wider mt-1 opacity-90 text-white">Coronel Suárez</h2>
        
        <div class="mt-6 bg-blue-400/30 px-8 py-2 rounded-full border border-white/20 text-white font-bold uppercase tracking-[0.2em] text-sm">
            Consulta de Afiliados
        </div>
    </header>

    <main class="flex-grow container mx-auto px-4 py-8 max-w-2xl">
        
        <!-- Aclaratoria Distrital -->
        <div class="mb-8 p-5 bg-amber-50 border-l-4 border-amber-400 text-amber-900 rounded-r-xl shadow-sm flex items-start">
            <i class="fas fa-exclamation-triangle text-xl mr-4 mt-1 opacity-70 text-amber-600"></i>
            <div>
                <p class="font-bold text-sm uppercase mb-1">Aviso Importante</p>
                <p class="text-sm leading-snug">Recuerde que el padrón corresponde al <strong>Distrito de Coronel Suárez</strong>.</p>
            </div>
        </div>

        <!-- Buscador -->
        <div class="bg-white rounded-3xl shadow-2xl p-8 mb-8 border border-gray-100 relative overflow-hidden">
            <!-- Overlay de Carga -->
            <div id="loadingOverlay" class="absolute inset-0 bg-white/95 z-20 flex flex-col items-center justify-center transition-opacity duration-500">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-900 mb-4"></div>
                <p id="loadingText" class="text-blue-900 font-bold text-sm animate-pulse">PREPARANDO PADRÓN...</p>
            </div>

            <label for="searchInput" class="block text-xs font-black text-blue-900 mb-4 uppercase tracking-[0.15em]">
                Ingrese Apellido o DNI
            </label>
            <div class="relative">
                <input type="text" id="searchInput" 
                    placeholder="Ej: Abalos o 36764951"
                    class="w-full pl-14 pr-6 py-5 bg-gray-50 border-2 border-gray-100 rounded-2xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 focus:bg-white outline-none transition-all text-xl font-medium shadow-inner"
                    disabled>
                <div class="absolute left-5 top-1/2 -translate-y-1/2 text-blue-900/30">
                    <i class="fas fa-search text-2xl"></i>
                </div>
            </div>
            <p class="text-[11px] text-gray-400 mt-5 italic text-center leading-relaxed">
                * El sistema busca coincidencias parciales. Puede ingresar solo las primeras letras del apellido.
            </p>
        </div>

        <!-- Resultados -->
        <div id="resultsArea" class="space-y-5">
            <div id="welcomeMessage" class="text-center py-20 bg-white/40 rounded-3xl border-2 border-dashed border-gray-200">
                <div class="bg-gray-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-fingerprint text-3xl text-gray-300"></i>
                </div>
                <p class="text-gray-500 font-bold uppercase tracking-widest text-xs">Esperando búsqueda...</p>
            </div>
        </div>
    </main>

    <footer class="py-10 text-center">
        <div class="flex justify-center items-center space-x-6 opacity-20">
            <div class="h-[1px] w-16 bg-blue-900"></div>
            <i class="fas fa-hands-helping text-blue-900 text-xl"></i>
            <div class="h-[1px] w-16 bg-blue-900"></div>
        </div>
    </footer>

    <script>
        // Nombre de archivo actualizado a padron.csv
        const CSV_FILENAME = 'padron.csv';
        const CSV_URL = encodeURI(CSV_FILENAME); 

        let padronData = [];

        // Direcciones actualizadas según tu pedido original
        const direccionesEscuelas = {
            "EP N°1": "Bartolomé mitre 1051 (esquina Av. Alsina), Cnel. Suárez",
            "EP N°15": "Calle 8 y 39, Huanguelén",
            "ES N° 2": "Av 11 de mayo 830, Santa María",
            "ES N°2": "Av 11 de mayo 830, Santa María"
        };

        const searchInput = document.getElementById('searchInput');
        const resultsArea = document.getElementById('resultsArea');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');

       async function loadCSV() {
            try {
                const response = await fetch(CSV_URL);
                if (!response.ok) throw new Error('Archivo padron.csv no encontrado');
                
                const data = await response.text();
                // Separamos por líneas
                const rows = data.split(/\r?\n/);
                
                // IMPORTANTE: 
                // 1. Usamos .slice(7) para saltar el encabezado que vimos en tu archivo.
                // 2. Usamos .split(';') porque tu CSV usa punto y coma.
                padronData = rows.slice(7).map(row => {
                    return row.split(';').map(cell => cell.trim().replace(/^"|"$/g, ''));
                }).filter(row => row.length >= 3 && row[0] !== ""); 

                loadingOverlay.style.opacity = '0';
                setTimeout(() => {
                    loadingOverlay.style.display = 'none';
                    searchInput.disabled = false;
                    searchInput.focus(); // Enfocar automáticamente para escribir
                }, 500);
                
                console.log("Padron cargado: " + padronData.length + " afiliados.");
            } catch (error) {
                console.error('Error:', error);
                loadingText.innerText = "ERROR AL CARGAR DATOS";
                // ... resto del código de error ...
            }
        }
                loadingText.className = "text-red-600 font-bold text-sm";
                loadingOverlay.querySelector('.animate-spin').style.display = 'none';
                
                resultsArea.innerHTML = `
                    <div class="bg-red-50 border border-red-200 p-6 rounded-2xl text-center text-red-800">
                        <i class="fas fa-file-csv text-4xl mb-4 opacity-50"></i>
                        <p class="font-bold text-lg">Error de carga</p>
                        <p class="text-sm mt-2 leading-relaxed">
                            No se pudo encontrar el archivo <strong>${CSV_FILENAME}</strong>.<br>
                            Asegúrese de subir el archivo a GitHub con ese nombre exacto.
                        </p>
                    </div>`;
            }
        }

        const normalizeText = (text) => {
            if (!text) return "";
            return text.toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        };

        const renderResult = (person) => {
            // Estructura: 0:Apellido, 1:Nombre, 2:Matrícula(DNI), 3:Circuito, 4:Establecimiento, 5:Mesa, 6:Orden
            const [apellido, nombre, dni, circuito, establecimiento, mesa, orden] = person;
            const escuelaKey = establecimiento ? establecimiento.trim() : "";
            const direccion = direccionesEscuelas[escuelaKey] || "Dirección no disponible";

            return `
                <div class="bg-white rounded-3xl shadow-lg overflow-hidden border border-gray-100 animate-fade-in">
                    <div class="p-6">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="text-2xl font-black text-gray-800 tracking-tight leading-none">${apellido || '---'}</h3>
                                <p class="text-lg font-medium text-gray-500">${nombre || '---'}</p>
                            </div>
                            <div class="bg-green-50 text-green-700 px-3 py-1 rounded-lg text-[10px] font-black uppercase tracking-tighter border border-green-100">
                                Afiliado Activo
                            </div>
                        </div>
                        
                        <div class="bg-blue-50/50 rounded-2xl p-4 mb-5 flex items-center justify-between">
                            <span class="text-blue-900/40 font-bold text-xs uppercase tracking-widest">Documento</span>
                            <span class="text-xl font-black text-blue-900">${dni || '---'}</span>
                        </div>

                        <div class="grid grid-cols-2 gap-4 mb-6">
                            <div class="bg-gray-50 p-4 rounded-2xl text-center border border-gray-100 shadow-sm">
                                <p class="text-[10px] text-gray-400 uppercase font-black mb-1">Mesa</p>
                                <p class="text-3xl font-black text-gray-800">${mesa || '-'}</p>
                            </div>
                            <div class="bg-gray-50 p-4 rounded-2xl text-center border border-gray-100 shadow-sm">
                                <p class="text-[10px] text-gray-400 uppercase font-black mb-1">N° Orden</p>
                                <p class="text-3xl font-black text-gray-800">${orden || '-'}</p>
                            </div>
                        </div>

                        <div class="pt-5 border-t border-gray-100">
                            <div class="flex items-start">
                                <div class="bg-red-100 p-3 rounded-xl mr-4 text-red-600">
                                    <i class="fas fa-map-marker-alt"></i>
                                </div>
                                <div>
                                    <p class="font-black text-gray-800 text-sm uppercase leading-tight mb-1">${establecimiento || 'No asignado'}</p>
                                    <p class="text-gray-500 text-sm leading-snug">${direccion}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        };

        searchInput.addEventListener('input', (e) => {
            const term = normalizeText(e.target.value);
            
            if (term.length < 3) {
                if (term.length === 0) {
                    resultsArea.innerHTML = `
                        <div id="welcomeMessage" class="text-center py-20 bg-white/40 rounded-3xl border-2 border-dashed border-gray-200">
                            <div class="bg-gray-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
                                <i class="fas fa-fingerprint text-3xl text-gray-300"></i>
                            </div>
                            <p class="text-gray-500 font-bold uppercase tracking-widest text-xs">Esperando búsqueda...</p>
                        </div>`;
                }
                return;
            }

            const filtered = padronData.filter(row => {
                const apellido = normalizeText(row[0] || "");
                const dni = (row[2] || "").toString();
                return apellido.includes(term) || dni.includes(term);
            });

            if (filtered.length === 0) {
                resultsArea.innerHTML = `
                    <div class="text-center py-16 bg-white rounded-3xl shadow-sm border border-gray-100 px-8">
                        <div class="w-20 h-20 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-6">
                            <i class="fas fa-user-times text-3xl text-red-300"></i>
                        </div>
                        <p class="text-gray-800 font-black text-xl mb-2">No encontrado</p>
                        <p class="text-gray-400 text-sm">La persona no figura en el padrón del distrito de Coronel Suárez.</p>
                    </div>`;
            } else {
                const resultsToShow = filtered.slice(0, 30);
                let html = resultsToShow.map(p => renderResult(p)).join('');
                
                if (filtered.length > 30) {
                    html += `
                        <div class="bg-blue-900 text-white text-center p-5 rounded-2xl shadow-lg font-bold text-sm">
                            <i class="fas fa-info-circle mr-2"></i> Mostrando 30 de ${filtered.length} coincidencias.
                            <br><span class="font-normal opacity-75 text-xs">Sea más preciso para encontrar un afiliado específico.</span>
                        </div>`;
                }
                resultsArea.innerHTML = html;
            }
        });

        window.addEventListener('DOMContentLoaded', loadCSV);
    </script>
</body>
</html>
