<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta Padrón - Partido Justicialista Coronel Suárez</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .pj-gradient { background: linear-gradient(135deg, #00529b 0%, #003d73 100%); }
        body { background-color: #f3f4f6; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans text-gray-900">

    <header class="pj-gradient text-white py-10 shadow-xl text-center flex flex-col items-center">
        <img src="logo.jpg" alt="Logo PJ" class="w-32 h-32 object-contain rounded-full border-4 border-white/20 bg-white mb-6" onerror="this.style.display='none';">
        <h1 class="text-3xl font-black uppercase tracking-tighter text-white">Partido Justicialista</h1>
        <h2 class="text-xl font-bold opacity-90 text-white">Coronel Suárez</h2>
    </header>

    <main class="flex-grow container mx-auto px-4 py-8 max-w-2xl">
        <div class="bg-white rounded-3xl shadow-2xl p-8 mb-8 border border-gray-100 relative">
            <div id="loadingOverlay" class="absolute inset-0 bg-white/95 z-20 flex flex-col items-center justify-center">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-900 mb-4"></div>
                <p class="text-blue-900 font-bold animate-pulse uppercase text-xs">Cargando Padrón...</p>
            </div>

            <label class="block text-xs font-black text-blue-900 mb-4 uppercase tracking-widest text-center">Ingrese Apellido o DNI</label>
            <div class="flex gap-2">
                <input type="text" id="searchInput" placeholder="Ej: Abalos o 36764951" class="flex-grow pl-6 pr-6 py-5 bg-gray-50 border-2 border-gray-100 rounded-2xl focus:border-blue-500 outline-none text-xl font-medium shadow-inner" disabled>
                <button id="searchButton" class="bg-blue-600 text-white px-6 rounded-2xl hover:bg-blue-700 transition-colors shadow-lg">
                    <i class="fas fa-search text-xl"></i>
                </button>
            </div>
            <p class="text-[11px] text-gray-400 mt-4 text-center font-medium">Haga clic en la lupa para buscar y registrar la consulta.</p>
        </div>

        <div id="resultsArea" class="space-y-5">
            <div id="welcomeMessage" class="text-center py-20 bg-white/40 rounded-3xl border-2 border-dashed border-gray-200 text-gray-400">
                <i class="fas fa-search text-3xl mb-4"></i>
                <p class="font-bold uppercase text-xs">Ingrese los datos para buscar</p>
            </div>
        </div>
    </main>

    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>

    <script>
        const CSV_FILENAME = 'padron.csv';
        let padronData = [];

        function registrarConsulta(termino) {
            // ID EXTRAÍDO DE TU CAPTURA DEL INSPECTOR
            const FORM_ACTION = "https://docs.google.com/forms/d/e/1FAIpQLScz4grdZg80W5CeOf7BQpbxn5jasnryrBFJejWYpfPJZndh4Q/formResponse";
            const ENTRY_ID = "entry.1952667277"; 
            
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = FORM_ACTION;
            form.target = 'hidden_iframe';

            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = ENTRY_ID;
            input.value = termino;

            form.appendChild(input);
            document.body.appendChild(form);
            form.submit();
            
            setTimeout(() => {
                document.body.removeChild(form);
            }, 500);
            console.log("Consulta registrada exitosamente");
        }

        async function loadCSV() {
            try {
                const response = await fetch(CSV_FILENAME);
                const data = await response.text();
                const rows = data.split(/\r?\n/);
                // Mantiene el formato: salta 7 filas y usa separador ";"
                padronData = rows.slice(7).map(row => row.split(';').map(cell => cell.trim().replace(/^"|"$/g, ''))).filter(row => row.length >= 3);
                document.getElementById('loadingOverlay').style.display = 'none';
                document.getElementById('searchInput').disabled = false;
            } catch (e) { 
                console.error("Error cargando CSV", e);
                document.getElementById('loadingOverlay').innerHTML = "<p class='text-red-500 font-bold'>Error al cargar padrón</p>";
            }
        }

        const normalizeText = (text) => text.toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");

        function realizarBusqueda() {
            const input = document.getElementById('searchInput');
            const termRaw = input.value.trim();
            const term = normalizeText(termRaw);
            
            if (term.length < 3) return;

            // REGISTRO SILENCIOSO EN GOOGLE SHEETS
            registrarConsulta(termRaw);

            // FILTRADO DE DATOS LOCALES
            const filtered = padronData.filter(row => normalizeText(row[0]).includes(term) || row[2].includes(term));
            
            const resultsArea = document.getElementById('resultsArea');
            if (filtered.length === 0) {
                resultsArea.innerHTML = '<div class="bg-white p-8 rounded-3xl text-center shadow animate-fade-in"><p class="text-gray-400 font-bold uppercase text-xs">No encontrado en el padrón</p></div>';
            } else {
                resultsArea.innerHTML = filtered.slice(0, 20).map(p => `
                    <div class="bg-white rounded-3xl shadow-lg p-6 border border-gray-100 animate-fade-in">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="text-2xl font-black text-gray-800">${p[0]}</h3>
                                <p class="text-lg font-medium text-gray-500">${p[1]}</p>
                            </div>
                            <span class="bg-blue-100 text-blue-700 text-[9px] font-black px-2 py-1 rounded uppercase">Afiliado PJ</span>
                        </div>
                        <div class="bg-blue-50 p-4 rounded-2xl flex justify-between mb-4">
                            <span class="text-blue-900/40 font-bold text-[10px] uppercase">DNI</span>
                            <span class="text-xl font-black text-blue-900">${p[2]}</span>
                        </div>
                        <div class="grid grid-cols-2 gap-4 mb-4">
                            <div class="bg-gray-50 p-4 rounded-2xl text-center"><p class="text-[10px] text-gray-400 uppercase">Mesa</p><p class="text-2xl font-black text-gray-700">${p[5] || '-'}</p></div>
                            <div class="bg-gray-50 p-4 rounded-2xl text-center"><p class="text-[10px] text-gray-400 uppercase">Orden</p><p class="text-2xl font-black text-gray-700">${p[6] || '-'}</p></div>
                        </div>
                        <div class="pt-4 border-t"><p class="font-black text-gray-800 text-xs uppercase"><i class="fas fa-map-marker-alt mr-2 text-red-500"></i>${p[4] || 'Escuela no asignada'}</p></div>
                    </div>
                `).join('');
            }
        }

        // Eventos: Clic en lupa y tecla Enter
        document.getElementById('searchButton').addEventListener('click', realizarBusqueda);
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') realizarBusqueda();
        });

        window.addEventListener('DOMContentLoaded', loadCSV);
    </script>
</body>
</html>
